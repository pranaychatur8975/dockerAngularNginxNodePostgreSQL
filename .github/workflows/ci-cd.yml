name: CI-CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Login to DockerHub
      - name: DockerHub login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4️⃣ Build frontend image
      - name: Build frontend Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-frontend:latest ./AngularFrontend

      # 5️⃣ Build backend image
      - name: Build backend Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/node-backend:latest ./NodeBackend

      # 6️⃣ Push images to Docker Hub
      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/node-backend:latest

      # 7️⃣ Deploy to remote server via SSH
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/ubuntu
            if [ ! -d app/.git ]; then
              git clone https://github.com/<your-username>/<your-repo>.git app
            else
              cd app
              git pull origin main
            fi
            cd app
            # Pull the latest images from Docker Hub
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/angular-frontend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/node-backend:latest
            docker-compose down
            docker-compose up -d
            docker ps
